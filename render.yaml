services:
  - type: web
    name: daxxi140-cafe-ordering-system
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python init_db.py && gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_DEBUG
        value: "0"
