{% extends "base.html" %}

{% block content %}
<section class="card">
    <div class="section-head">
        <div>
            <h2>Customer Menu</h2>
            <p>Select an item to place an order.</p>
        </div>
        <form method="GET" class="filter-grid">
            <div>
                <label for="category">Category</label>
                <select id="category" name="category">
                    <option value="All">All</option>
                    {% for category in categories %}
                    <option value="{{ category.category }}" {% if selected_category == category.category %}selected{% endif %}>{{ category.category }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label for="search">Search</label>
                <input id="search" name="search" type="text" value="{{ search }}" placeholder="Search menu items">
            </div>
            <div class="filter-actions">
                <button type="submit">Apply</button>
            </div>
        </form>
    </div>

    <div class="menu-grid">
        {% for item in menu_items %}
        <article class="menu-item">
            <p class="menu-category">{{ item.category }}</p>
            <h3>{{ item.name }}</h3>
            <p class="price">${{ "%.2f"|format(item.price) }}</p>
            <a class="button-link" href="{{ url_for('create_order', item_id=item.id) }}">Order Now</a>
        </article>
        {% else %}
        <p>No menu items match the current filter.</p>
        {% endfor %}
    </div>
</section>
{% endblock %}
