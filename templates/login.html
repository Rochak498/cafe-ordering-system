{% extends "base.html" %}

{% block content %}
<section class="card">
    <h2>Staff Login</h2>
    <form method="POST">
        <label>Username</label>
        <input type="text" name="username" required>

        <label>Password</label>
        <input type="password" name="password" required>

        <button type="submit">Login</button>
    </form>

    <p><strong>Demo login:</strong> admin / admin123</p>
</section>
{% endblock %}
