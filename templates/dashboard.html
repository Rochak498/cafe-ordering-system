{% extends "base.html" %}

{% block content %}
<section class="dashboard-grid">
    <div class="card metric">
        <h2>Total Orders</h2>
        <p>{{ total_orders }}</p>
    </div>

    <div class="card metric">
        <h2>Total Revenue</h2>
        <p>${{ "%.2f"|format(total_revenue) }}</p>
    </div>

    <div class="card metric">
        <h2>Pending</h2>
        <p>{{ pending_orders }}</p>
    </div>

    <div class="card metric">
        <h2>Preparing</h2>
        <p>{{ preparing_orders }}</p>
    </div>

    <div class="card metric">
        <h2>Ready</h2>
        <p>{{ ready_orders }}</p>
    </div>

    <div class="card metric">
        <h2>Completed</h2>
        <p>{{ completed_orders }}</p>
    </div>
</section>
{% endblock %}
